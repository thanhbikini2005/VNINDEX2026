name: VN-Index Bot

on:
  schedule:
    # 7:00 sáng ICT = 00:00 UTC (thứ 2–6)
    - cron: "0 0 * * 1-5"
    # 16:30 chiều ICT = 09:30 UTC (thứ 2–6)
    - cron: "30 9 * * 1-5"

  # Cho phép chạy thủ công từ GitHub Actions UI
  workflow_dispatch:
    inputs:
      session:
        description: "Phiên báo cáo (morning/afternoon)"
        required: false
        default: "morning"

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Cài đặt thư viện
        run: pip install -r requirements.txt

      - name: 🤖 Chạy bot phân tích VN-Index
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python vnindex_bot.py
